<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave a Review | Courtney Self Team</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        
        .team-photo {
            width: 180px;
            height: auto;
            margin-bottom: 24px;
            border-radius: 12px;
        }
        
        .team-name {
            font-size: 14px;
            font-weight: 600;
            color: #0f3460;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
            line-height: 1.2;
        }
        
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .stars {
            font-size: 32px;
            margin-bottom: 32px;
            letter-spacing: 4px;
        }
        
        .review-btn {
            display: inline-block;
            background: linear-gradient(135deg, #4285f4 0%, #1a73e8 100%);
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            padding: 18px 48px;
            border-radius: 50px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }
        
        .review-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.5);
        }
        
        .review-btn:active {
            transform: translateY(0);
        }
        
        .google-icon {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        .time-note {
            margin-top: 16px;
            font-size: 14px;
            color: #999;
        }
        
        .social-proof {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #888;
        }
        
        .social-proof strong {
            color: #333;
        }
        
        .branding {
            margin-top: 24px;
            font-size: 12px;
            color: #aaa;
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .review-btn {
                padding: 16px 36px;
                font-size: 16px;
            }
            
            .team-photo {
                width: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="team-photo.jpg" 
             alt="Courtney Self Team" 
             class="team-photo">
        
        <div class="team-name">Courtney Self Team</div>
        
        <h1>Thank You for Trusting Us</h1>
        
        <p class="subtitle">Your feedback helps other clients find a team they can trust.</p>
        
        <div class="stars">⭐⭐⭐⭐⭐</div>
        
        <a href="https://search.google.com/local/writereview?placeid=ChIJBfn6JkRL3YARWMBUTZ4oMZk" 
           class="review-btn" 
           target="_blank" 
           rel="noopener">
            <svg class="google-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Leave a Review
        </a>
        
        <p class="time-note">Takes less than 30 seconds 🙏</p>
        
        <p class="social-proof">
            Join <strong>16+ happy clients</strong> who've shared their experience
        </p>
        
        <p class="branding">
            Harcourts Hunter Mason Realty · DRE #01906720
        </p>
    </div>
</body>
</html>
